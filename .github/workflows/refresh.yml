name: Refresh data

on:
  schedule:
    # Cron is UTC. IST = UTC+5:30. The "commit only if changed" step means off-hours runs
    # that find no new news/market data don't rebuild Pages — so a dense schedule stays cheap.
    - cron: '*/10 4-9 * * 1-5'    # every 10 min, 09:30–15:20 IST weekdays — market-hours pulse
    - cron: '0,30 0-3 * * 1-5'    # every 30 min, 05:30–09:00 IST weekdays — pre-market news
    - cron: '0,30 10-23 * * 1-5'  # every 30 min, 15:30 IST → 05:00 IST weekdays — post-close, evening & overnight news/IPO
    - cron: '0,30 * * * 0,6'      # every 30 min, all day Sat & Sun — weekend news/IPO
  workflow_dispatch: {}       # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Debounce: the schedule (fallback) and the external cron (primary) both trigger this
      # workflow. If a refresh landed in the last 8 min, skip — keeps the combined commit rate
      # under GitHub Pages' ~10 builds/hour soft limit no matter how the two triggers overlap.
      - name: Debounce — skip if refreshed in the last 8 min
        id: debounce
        run: |
          LAST=$(git log -1 --format=%ct 2>/dev/null || echo 0)
          AGE=$(( $(date +%s) - LAST ))
          if [ "$AGE" -lt 480 ]; then
            echo "Last refresh ${AGE}s ago (<480s) — another trigger just ran; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build data.json + embed.js
        if: steps.debounce.outputs.skip != 'true'
        run: node scripts/refresh.mjs
      - name: Push phone notification if top headline changed
        if: steps.debounce.outputs.skip != 'true'
        run: |
          if [ -f data/.notify ]; then
            curl -s -H "Title: Daily Pulse" -H "Tags: newspaper" \
              -d "$(cat data/.notify)" "ntfy.sh/${NTFY_TOPIC}" || true
            rm -f data/.notify
          fi
        env:
          # Your private notification channel. Change it to any hard-to-guess string,
          # then subscribe to the same topic in the ntfy app on your phone.
          NTFY_TOPIC: arpit-daily-pulse-x7k93q
      - name: Commit if changed
        if: steps.debounce.outputs.skip != 'true'
        run: |
          git config user.name "pulse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/data.json data/embed.js
          if git diff --staged --quiet; then echo "no data change"; exit 0; fi
          git commit -m "data: refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          if git push origin HEAD:main; then exit 0; fi
          echo "push rejected — checking whether a newer refresh already landed"
          git fetch origin main
          if [ "$(git rev-list --count HEAD..origin/main)" -gt 0 ]; then
            echo "remote already advanced (a newer refresh won the race) — ours is redundant, done."
            exit 0
          fi
          echo "push failed for a non-race reason — retrying once"
          git push origin HEAD:main
      - name: Alert phone if the refresh failed
        if: failure()
        run: |
          curl -s -H "Title: Daily Pulse refresh FAILED" -H "Tags: rotating_light" -H "Priority: high" \
            -d "The data refresh workflow failed at $(date -u +'%Y-%m-%d %H:%M UTC'). Open the Actions tab to see which step broke." \
            "ntfy.sh/${NTFY_TOPIC}" || true
        env:
          NTFY_TOPIC: arpit-daily-pulse-x7k93q
