<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0F1012">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Daily Pulse</title>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#0E0F12; --bg2:#15171B; --card:#191B20; --card2:#20232A; --raise:#262A32;
    --ink:#F3F2EE; --ink2:#A8A69E; --ink3:#6C6A62; --line:#282B31; --line2:#33373F;
    --accent:#E8794F; --accent2:#F4a074; --accentd:#C6613F; --accent-soft:#2C1E17;
    --up:#48CC7C; --up-soft:#0F2A1B; --down:#F26B5A; --down-soft:#2C1512;
    --gold:#E5B84C; --gold-soft:#2A2413; --blue:#6FA8DC; --blue-soft:#16222E; --violet:#9E8CFF; --violet-soft:#1E1A33; --teal:#49C7BC; --teal-soft:#0F2724;
    --radius:20px; --r-sm:14px; --nav-h:62px; --shadow:0 8px 30px rgba(0,0,0,.4); --shadow-sm:0 2px 10px rgba(0,0,0,.25);
    --ease:cubic-bezier(.22,.61,.36,1); --spring:cubic-bezier(.34,1.4,.5,1); --maxw:540px;
  }
  :root[data-theme="light"]{
    --bg:#F5F5F2; --bg2:#ECEBE6; --card:#FFFFFF; --card2:#F7F6F2; --raise:#EFEDE7;
    --ink:#1B1A16; --ink2:#6B6960; --ink3:#A5A399; --line:#E7E5DE; --line2:#DAD8D0;
    --accent:#C6613F; --accent2:#D97A54; --accentd:#AE5133; --accent-soft:#FBEEE8;
    --up:#268A4B; --up-soft:#E7F4EC; --down:#C1412F; --down-soft:#FBEBE8;
    --gold:#9A7B18; --gold-soft:#F6EFD8; --blue:#3C6288; --blue-soft:#EAF1F7; --violet:#6A57C7; --violet-soft:#EEEBFA; --teal:#1E9188; --teal-soft:#E4F4F2;
    --shadow:0 8px 30px rgba(30,28,20,.1); --shadow-sm:0 2px 10px rgba(30,28,20,.06);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',system-ui,sans-serif;
    font-size:15px;line-height:1.5;overscroll-behavior-y:none;transition:background .3s,color .3s;
    -webkit-font-smoothing:antialiased}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  button{font-family:inherit;color:inherit}
  a{color:inherit}
  ::-webkit-scrollbar{display:none}
  #app{max-width:var(--maxw);margin:0 auto;padding:0 14px calc(var(--nav-h) + env(safe-area-inset-bottom) + 26px);min-height:100%}

  /* header */
  header{position:sticky;top:0;z-index:30;background:linear-gradient(var(--bg) 70%,transparent);
    padding:calc(env(safe-area-inset-top) + 12px) 2px 10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  header .hi{font-size:20px;font-weight:800;letter-spacing:-.02em}
  header .hi em{color:var(--accent);font-style:normal}
  header .meta{font-size:11.5px;color:var(--ink3);margin-top:1px}
  header .meta .stale{color:var(--down)}
  .hbtns{display:flex;gap:8px;align-items:center}
  .icb{width:40px;height:40px;border-radius:13px;border:1px solid var(--line);background:var(--card);color:var(--ink2);
    font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s}
  .icb:active{transform:scale(.92)}
  .ava{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;font-weight:800;font-size:15px;color:#fff;
    background:linear-gradient(135deg,var(--accent),var(--accentd));display:flex;align-items:center;justify-content:center;transition:transform .15s;position:relative}
  .ava:active{transform:scale(.92)}
  .ava::after{content:"⚙";position:absolute;bottom:-3px;right:-3px;width:17px;height:17px;border-radius:50%;background:var(--card);border:1px solid var(--line2);font-size:9px;display:flex;align-items:center;justify-content:center;color:var(--ink2)}

  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:13px;box-shadow:var(--shadow-sm)}
  .card>h2,.sec{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--ink2);
    margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .chip{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:20px;background:var(--accent-soft);color:var(--accent);white-space:nowrap;letter-spacing:.02em}
  .chip.b{background:var(--blue-soft);color:var(--blue)} .chip.g{background:var(--up-soft);color:var(--up)}
  .chip.go{background:var(--gold-soft);color:var(--gold)} .chip.v{background:var(--violet-soft);color:var(--violet)}
  .live{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--up);margin-right:5px;vertical-align:1px;box-shadow:0 0 0 0 var(--up);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(72,204,124,.5)}70%{box-shadow:0 0 0 6px rgba(72,204,124,0)}100%{box-shadow:0 0 0 0 rgba(72,204,124,0)}}
  .up{color:var(--up)} .dn{color:var(--down)}

  /* tabs / nav */
  .tabpage{display:none;animation:fade .22s var(--ease)}
  .tabpage.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--maxw);z-index:40;
    height:calc(var(--nav-h) + env(safe-area-inset-bottom));padding:0 10px env(safe-area-inset-bottom);
    background:color-mix(in srgb,var(--card) 82%,transparent);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
    border-top:1px solid var(--line);display:flex;align-items:stretch}
  nav button{flex:1;border:none;background:none;color:var(--ink3);font-size:10px;font-weight:700;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative;transition:color .2s}
  nav button svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;transition:transform .3s var(--spring)}
  nav button.on{color:var(--accent)}
  nav button.on svg{transform:translateY(-2px) scale(1.08)}
  nav button.on::before{content:"";position:absolute;top:7px;width:34px;height:30px;border-radius:12px;background:var(--accent-soft);z-index:-1}

  /* hero */
  .hero{position:relative;overflow:hidden;border:none;color:#fff;background:linear-gradient(135deg,#2A2620,#3C362C);padding:20px 18px}
  :root[data-theme="light"] .hero{background:linear-gradient(135deg,#3A362E,#26231E)}
  .hero::after{content:"";position:absolute;right:-30px;top:-30px;width:150px;height:150px;border-radius:50%;
    background:radial-gradient(circle,var(--accent),transparent 70%);opacity:.35}
  .hero .g{font-size:22px;font-weight:800;letter-spacing:-.02em;position:relative}
  .hero .d{color:#D6D2C6;font-size:13px;margin-top:3px;position:relative}
  .hero .strip{display:flex;gap:14px;margin-top:16px;position:relative}
  .hero .hstat{flex:1}
  .hero .hstat .v{font-size:19px;font-weight:800}.hero .hstat .k{font-size:11px;color:#C9C5B9;font-weight:600}
  .ring{--p:0;width:52px;height:52px;flex-shrink:0}
  .ring circle{fill:none;stroke-width:5}
  .ring .bg{stroke:rgba(255,255,255,.18)} .ring .fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 1s var(--ease)}
  .ringwrap{display:flex;align-items:center;gap:12px}
  .ringwrap .rn{font-size:19px;font-weight:800}.ringwrap .rk{font-size:11px;color:#C9C5B9;font-weight:600}

  /* ticker */
  .ticker{display:flex;gap:9px;overflow-x:auto;padding:2px 0 4px;scroll-snap-type:x mandatory}
  .tik{flex-shrink:0;min-width:112px;background:var(--card2);border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 12px;scroll-snap-align:start}
  .tik .k{font-size:11px;color:var(--ink2);font-weight:700}
  .tik .v{font-size:16px;font-weight:800;margin-top:3px}
  .tik .c{font-size:11.5px;font-weight:700;margin-top:1px}

  /* rows */
  .row{display:flex;align-items:center;gap:11px;padding:11px 2px;border-top:1px solid var(--line);cursor:pointer;transition:background .15s}
  .row:first-of-type{border-top:none}
  .row:active{background:var(--card2)}
  .row .nm{flex:1;font-weight:700;font-size:14px;min-width:0}
  .row .nm small{display:block;color:var(--ink3);font-size:11px;font-weight:500;margin-top:1px}
  .row .pr{font-weight:800;font-size:14px}
  .row .pc{min-width:62px;text-align:right;font-weight:800;font-size:12.5px}
  .row .logo{width:26px;height:26px;border-radius:50%;flex-shrink:0;object-fit:contain;background:var(--card2)}
  .row .spk{flex-shrink:0}
  .idxgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .idx{background:var(--card2);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px;position:relative;overflow:hidden;cursor:pointer;transition:transform .15s}
  .idx:active{transform:scale(.97)}
  .idx .k{font-size:12px;font-weight:700;color:var(--ink2)}
  .idx .v{font-size:18px;font-weight:800;margin-top:3px}
  .idx .c{font-size:12px;font-weight:700;margin-top:1px}
  .idx svg.spark{position:absolute;right:9px;bottom:10px;opacity:.85}
  .pend{color:var(--ink3);font-size:12px;font-weight:600;margin-top:6px}
  .insight{display:flex;gap:9px;align-items:flex-start;font-size:13.5px;color:var(--ink2);padding:5px 0}
  .insight::before{content:"◆";color:var(--accent);font-size:9px;padding-top:5px}
  .mood{border:none;background:linear-gradient(135deg,var(--card2),var(--card));border:1px solid var(--line)}
  .moodrow{display:flex;align-items:center;gap:14px}
  .moodbig{font-size:26px;font-weight:800;letter-spacing:-.02em}
  .breadthbar{height:8px;border-radius:6px;background:var(--down);overflow:hidden;margin-top:4px}
  .breadthbar i{display:block;height:100%;background:var(--up);border-radius:6px}
  .sectors{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
  .sct{border-radius:12px;padding:10px 6px;text-align:center;border:1px solid var(--line);cursor:pointer;transition:transform .12s}
  .sct:active{transform:scale(.95)}
  .sct .sn{font-size:11px;font-weight:800;color:var(--ink2)}
  .sct .sp{font-size:12.5px;font-weight:800;margin-top:3px}
  .sct.pos{background:var(--up-soft);border-color:transparent} .sct.pos .sp{color:var(--up)}
  .sct.neg{background:var(--down-soft);border-color:transparent} .sct.neg .sp{color:var(--down)}
  .movers{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .mvcol .mh{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;color:var(--ink2)}
  .mv{display:flex;justify-content:space-between;gap:6px;font-size:13px;padding:6px 0;font-weight:700;border-top:1px solid var(--line)}
  .mv:first-of-type{border-top:none}
  .pe{font-size:10.5px;font-weight:700;color:var(--ink3);background:var(--card2);border-radius:6px;padding:1px 6px;margin-left:6px;white-space:nowrap}
  .disc{font-size:11px;color:var(--ink3);margin-top:10px;font-style:italic;line-height:1.4}

  /* deck */
  .deckhint{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink3);padding:2px 6px 10px;font-weight:600}
  .deckwrap{position:relative;height:352px;margin-bottom:6px}
  .deckcard{position:absolute;inset:0;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px 18px;box-shadow:var(--shadow);display:flex;flex-direction:column;touch-action:none;user-select:none;cursor:grab}
  .deckcard.top{transition:transform .28s var(--ease),opacity .28s ease}
  .deckcard.drag{transition:none}
  .deckcard .tag{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--accent)}
  .deckcard .ttl{font-size:19px;font-weight:800;line-height:1.3;margin-top:8px;letter-spacing:-.01em}
  .deckcard .src{color:var(--ink3);font-size:12.5px;margin-top:8px}
  .deckcard .body{color:var(--ink2);font-size:14px;margin-top:11px;overflow-y:auto;flex:1;touch-action:pan-y}
  .deckcard .foot{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
  .stampR,.stampL,.stampU{position:absolute;top:20px;font-size:15px;font-weight:800;letter-spacing:.05em;padding:6px 12px;border-radius:10px;opacity:0;pointer-events:none}
  .stampR{left:18px;color:var(--up);border:2.5px solid var(--up);transform:rotate(-8deg)}
  .stampL{right:18px;color:var(--down);border:2.5px solid var(--down);transform:rotate(8deg)}
  .stampU{bottom:74px;left:50%;transform:translateX(-50%) rotate(-3deg);color:var(--gold);border:2.5px solid var(--gold)}
  .bmbtn{position:absolute;top:15px;right:15px;width:36px;height:36px;border-radius:12px;border:1px solid var(--line);background:var(--card2);color:var(--ink3);font-size:15px;cursor:pointer}
  .openlink{font-size:13px;font-weight:800;color:var(--accent);text-decoration:none;border:1.5px solid var(--accent);border-radius:11px;padding:8px 13px}
  .deckdone{text-align:center;padding:40px 12px;color:var(--ink2)}
  .deckdone .big{font-size:38px}

  /* browse / lists */
  .lvl2{font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--accent);margin:15px 0 3px;opacity:.9}
  a.brow{display:block;padding:10px 2px;border-top:1px solid var(--line);text-decoration:none}
  a.brow:first-of-type{border-top:none}
  a.brow .bt{font-size:13.5px;font-weight:600;color:var(--ink)}
  a.brow .bs{font-size:11.5px;color:var(--ink3);margin-top:1px}
  a.brow.rd{background:var(--up-soft);margin:0 -8px;padding:10px;border-radius:11px;border-top-color:transparent}
  a.brow.rd .bt::after{content:" ✓";color:var(--up)}
  .iporow .bt{color:var(--ink2)!important}
  .ipochips{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0 2px}
  .ipochip{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:8px;background:var(--up-soft);color:var(--up)}

  /* segmented */
  .seg{display:flex;background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:4px;margin-bottom:13px;position:relative}
  .seg button{flex:1;border:none;background:none;padding:9px 6px;border-radius:10px;font-weight:800;font-size:13px;color:var(--ink2);cursor:pointer;z-index:1;transition:color .2s}
  .seg button.on{color:var(--ink)}
  .seg .pill{position:absolute;top:4px;bottom:4px;border-radius:10px;background:var(--card);box-shadow:var(--shadow-sm);transition:transform .3s var(--spring),width .3s var(--spring)}

  /* learn */
  .trackcard{display:flex;gap:13px;align-items:center;padding:13px 2px;border-top:1px solid var(--line);cursor:pointer;transition:background .15s}
  .trackcard:first-of-type{border-top:none}
  .trackcard:active{background:var(--card2)}
  .tico{width:46px;height:46px;border-radius:15px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0}
  .tbody{flex:1;min-width:0}.tname{font-weight:800;font-size:15px}.tsub{font-size:12px;color:var(--ink3);margin-top:1px}
  .pbar{height:6px;border-radius:6px;background:var(--line2);margin-top:8px;overflow:hidden}
  .pbar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s var(--ease)}
  .tring{width:40px;height:40px;flex-shrink:0}
  .tring circle{fill:none;stroke-width:4}.tring .bg{stroke:var(--line2)}.tring .fg{stroke:var(--accent);stroke-linecap:round}
  .backbtn{border:none;background:none;color:var(--accent);font-weight:800;font-size:13.5px;cursor:pointer;padding:4px 0 12px}
  .lvl{font-size:11.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin:15px 0 5px}
  .lesson{display:flex;gap:11px;align-items:center;padding:12px 2px;border-top:1px solid var(--line);cursor:pointer}
  .lesson .st{width:27px;height:27px;border-radius:50%;border:2px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:var(--up);font-weight:800}
  .lesson.done .st{border-color:var(--up);background:var(--up-soft)}
  .lesson .t{flex:1;font-weight:600;font-size:14px}.lesson .xp{font-size:11px;color:var(--ink3);font-weight:800}
  .lessonview h3{font-size:20px;font-weight:800;margin-bottom:4px;letter-spacing:-.01em}
  .lessonview .sub{color:var(--ink3);font-size:12.5px;margin-bottom:13px}
  p.concept{font-size:14.5px;color:var(--ink)}p.concept+p.concept{margin-top:9px}
  .exbox{background:var(--blue-soft);border-radius:14px;padding:12px 14px;margin-top:12px;font-size:13.5px;color:var(--ink)}
  .exbox b{color:var(--blue);font-size:11px;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:4px}
  pre.code{background:#0B0C0E;color:#E6E3DB;border-radius:14px;padding:13px 14px;font-size:12.5px;font-family:ui-monospace,'Cascadia Code',Consolas,monospace;overflow-x:auto;margin-top:11px;line-height:1.55;white-space:pre;border:1px solid var(--line)}
  .trybox{background:var(--gold-soft);border-radius:14px;padding:12px 14px;margin-top:12px;font-size:13.5px}
  .trybox b{color:var(--gold);font-size:11px;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:4px}
  .missbox{background:var(--down-soft);border-radius:14px;padding:12px 14px;margin-top:12px;font-size:13.5px}
  .missbox b{color:var(--down);font-size:11px;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:6px}
  .miss{margin:7px 0}.miss .mx{color:var(--down);font-weight:800;margin-right:4px}.miss .mfix{color:var(--ink2);font-size:12.5px;margin-top:2px;padding-left:16px}
  .linksrow{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px}
  .linksrow b{width:100%;color:var(--ink3);font-size:11px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
  .lnk{border:1px solid var(--line);background:var(--card2);color:var(--blue);border-radius:10px;padding:6px 11px;font-size:12.5px;font-weight:700;text-decoration:none}
  .qbox{margin-top:16px;border-top:1px solid var(--line);padding-top:14px}
  .qq{font-weight:800;font-size:14.5px;margin-bottom:10px}
  .opt{display:block;width:100%;text-align:left;border:1.5px solid var(--line2);background:var(--card);color:var(--ink);border-radius:13px;padding:11px 13px;font-size:13.5px;font-weight:600;cursor:pointer;margin-bottom:8px;transition:transform .1s}
  .opt:active{transform:scale(.99)}
  .opt.ok{border-color:var(--up);background:var(--up-soft)} .opt.bad{border-color:var(--down);background:var(--down-soft)} .opt.reveal{border-color:var(--up)}
  .opt:disabled{cursor:default;opacity:.95}
  .explain{border-radius:13px;padding:11px 13px;font-size:13px;margin:4px 0 10px}
  .explain.good{background:var(--up-soft)} .explain.badx{background:var(--down-soft)}
  .explain b{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
  .kc{border-top:1px solid var(--line)}.kc:first-of-type{border-top:none}
  .kc summary{list-style:none;cursor:pointer;display:flex;gap:12px;padding:13px 2px;align-items:flex-start}
  .kc summary::-webkit-details-marker{display:none}
  .kn{color:var(--ink3);font-size:13px;min-width:20px;padding-top:2px;font-weight:800}
  .khead{flex:1;min-width:0}.ktitle{font-weight:700;font-size:14.5px;display:block}.kteaser{color:var(--ink2);font-size:13px;margin-top:2px}
  .khint{color:var(--accent);font-size:11px;font-weight:800;white-space:nowrap;padding-top:4px}
  .kc[open] .khint::after{content:"LESS ▴"}.kc:not([open]) .khint::after{content:"MORE ▾"}
  .kbody{padding:0 2px 15px 32px;font-size:13.5px;color:var(--ink2)}.kbody p+p{margin-top:8px}

  /* buttons */
  .bigbtn{display:block;width:100%;border:none;background:var(--accent);color:#fff;font-weight:800;font-size:14.5px;border-radius:14px;padding:14px;cursor:pointer;margin-top:12px;transition:transform .12s}

<script>
(function(){
  'use strict';
  var $=function(s,r){return (r||document).querySelector(s);};
  var $$=function(s,r){return [].slice.call((r||document).querySelectorAll(s));};
  var esc=function(x){var d=document.createElement('div');d.textContent=(x==null?'':String(x));return d.innerHTML;};
  var vibe=function(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}};
  var store={get:function(k,f){try{var v=localStorage.getItem('dp_'+k);return v==null?f:JSON.parse(v);}catch(e){return f;}},
    set:function(k,v){try{localStorage.setItem('dp_'+k,JSON.stringify(v));}catch(e){}}};
  /* ===== aggregate analytics — anonymous, opt-out, OFF until a GA4 id is set ===== */
  /* Set ANALYTICS.ga4 to your GA4 Measurement ID (e.g. 'G-XXXXXXXXXX') to enable.
     Empty = zero tracking, zero external calls. No personal data or identity is ever sent. */
  var ANALYTICS={ga4:''};
  function analyticsOn(){ return !!ANALYTICS.ga4 && !store.get('noanalytics',false); }
  (function(){ if(!analyticsOn())return;
    var s=document.createElement('script');s.async=true;s.src='https://www.googletagmanager.com/gtag/js?id='+ANALYTICS.ga4;document.head.appendChild(s);
    window.dataLayer=window.dataLayer||[];window.gtag=function(){window.dataLayer.push(arguments);};
    window.gtag('js',new Date());window.gtag('config',ANALYTICS.ga4,{anonymize_ip:true}); })();
  function track(name,params){ try{ if(analyticsOn()&&window.gtag)window.gtag('event',name,params||{}); }catch(e){} }
  var hash=function(s){var h=5381;for(var i=0;i<s.length;i++){h=((h<<5)+h+s.charCodeAt(i))|0;}return 'h'+(h>>>0).toString(36);};
  var todayKey=function(d){d=d||new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
  function fmtN(x){return (x==null)?'—':(+x).toLocaleString('en-IN',{maximumFractionDigits:2});}
  function fmtC(x){ x=+x; if(x>=1e7)return '₹'+(x/1e7).toFixed(2)+'Cr'; if(x>=1e5)return '₹'+(x/1e5).toFixed(2)+'L'; return '₹'+fmtN(x); }
  function fmtDur(s){if(s<3600)return Math.round(s/60)+'m';return Math.floor(s/3600)+'h '+Math.round((s%3600)/60)+'m';}
  function pctCls(p){return p>=0?'up':'dn';}
  function pctTxt(p){return (p>=0?'+':'')+(+p).toFixed(2)+'%';}

  /* number roll */
  function rollNum(el,to,fmt){ fmt=fmt||fmtN; var from=+(el.getAttribute('data-v')||0)||0; if(from===to){el.textContent=fmt(to);return;}
    var t0=null,d=700; function step(t){ if(!t0)t0=t; var k=Math.min(1,(t-t0)/d); var e=1-Math.pow(1-k,3);
      el.textContent=fmt(from+(to-from)*e); if(k<1)requestAnimationFrame(step); else {el.textContent=fmt(to);el.setAttribute('data-v',to);} }
    el.setAttribute('data-v',to); requestAnimationFrame(step); }
  function spark(pts,w,h,cls){ if(!pts||pts.length<2)return '';
    var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts),rg=(mx-mn)||1,st=w/(pts.length-1);
    var d=pts.map(function(p,i){return (i?'L':'M')+(i*st).toFixed(1)+' '+(h-((p-mn)/rg)*h+1).toFixed(1);}).join(' ');
    return '<svg class="spark" width="'+w+'" height="'+(h+2)+'"><path d="'+d+'" fill="none" stroke="currentColor" stroke-width="1.8" class="'+cls+'" opacity=".8"/></svg>'; }
  function bigChart(pts,cls){ if(!pts||pts.length<2)return '<div style="color:var(--ink3);font-size:12px">No chart data yet.</div>';
    var w=480,h=92,mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts),rg=(mx-mn)||1,st=w/(pts.length-1);
    var d=pts.map(function(p,i){return (i?'L':'M')+(i*st).toFixed(1)+' '+(h-((p-mn)/rg)*(h-10)-5).toFixed(1);}).join(' ');
    return '<div class="'+cls+'"><svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none"><path d="'+d+' L'+w+' '+h+' L0 '+h+' Z" fill="currentColor" opacity=".09"/><path d="'+d+'" fill="none" stroke="currentColor" stroke-width="2.2" vector-effect="non-scaling-stroke"/></svg></div>'; }
  function ring(pct,size,rn,rk){ var r=(size-6)/2,c=2*Math.PI*r,off=c*(1-pct/100);
    return '<div class="ringwrap"><svg class="ring" viewBox="0 0 '+size+' '+size+'"><circle class="bg" cx="'+size/2+'" cy="'+size/2+'" r="'+r+'"/>'
      +'<circle class="fg" cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 '+size/2+' '+size/2+')"/></svg>'
      +(rn!=null?'<div><div class="rn">'+rn+'</div><div class="rk">'+rk+'</div></div>':'')+'</div>'; }

  /* ===== score engine ===== */
  var stats=store.get('stats',{news_read:0,news_hidden:0,gk_done:0,learn_open:0,quiz_att:0,quiz_ok:0,lessons_done:0,ai_used:0,time_s:0,xp:0});
  var daylog=store.get('daylog',{});
  var LEVELS=[[0,'Rookie'],[100,'Learner'],[300,'Explorer'],[650,'Analyst'],[1100,'Specialist'],[1800,'Expert'],[2800,'Master']];
  function levelInfo(){var cur=LEVELS[0],next=null;for(var i=0;i<LEVELS.length;i++){if(stats.xp>=LEVELS[i][0])cur=LEVELS[i];else{next=LEVELS[i];break;}}return {name:cur[1],base:cur[0],next:next};}
  function dlog(){var k=todayKey();if(!daylog[k])daylog[k]={t:0,a:0};return daylog[k];}
  function bump(stat,xp,silent){ if(stat)stats[stat]=(stats[stat]||0)+1;
    if(xp){var b=levelInfo().name;stats.xp+=xp;var a=levelInfo().name;if(a!==b)toast('Level up — you are now '+a+' 🏅');}
    dlog().a++; store.set('stats',stats); store.set('daylog',daylog); if(!silent&&tab==='you')renderYou(); }
  setInterval(function(){if(document.visibilityState==='visible'){stats.time_s+=15;dlog().t+=15;store.set('stats',stats);store.set('daylog',daylog);}},15000);
  function streak(){var n=0,d=new Date();for(;;){var k=todayKey(d);if(daylog[k]&&(daylog[k].a>0||daylog[k].t>30)){n++;d.setDate(d.getDate()-1);}else break;}return n;}
  dlog(); store.set('daylog',daylog);

  /* ===== theme ===== */
  var theme=store.get('theme',matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');
  function applyTheme(){document.documentElement.setAttribute('data-theme',theme);
    var m=$('meta[name=theme-color]');if(m)m.setAttribute('content',theme==='dark'?'#0E0F12':'#F5F5F2');}

  /* ===== profile / personalization ===== */
  var profile=store.get('profile',null);
  var ALLTOPICS=['Business','Share Market','Sports','Tech','AI','Economy','Politics','Jobs','Crime','World','For You'];
  var LEARN_INTERESTS=[['money','💰 Money & Investing'],['data','🗃️ Data & Analytics'],['ai','🤖 AI & Tech'],['career','🚀 Career & Interview'],['business','♟️ Business'],['comm','🗣️ Communication'],['gk','🌍 GK & World'],['habits','⚡ Habits']];
  function myName(){return (profile&&profile.name)||'there';}
  function topicOn(tag){return !profile||!profile.topics||!profile.topics.length||profile.topics.indexOf(tag)>=0;}
  function myLLM(){return (profile&&profile.llm)||store.get('llm','claude');}

  /* ===== LLM handoff ===== */
  var LLM={claude:function(q){return 'https://claude.ai/new?q='+encodeURIComponent(q);},
    chatgpt:function(q){return 'https://chatgpt.com/?q='+encodeURIComponent(q);},
    perplexity:function(q){return 'https://www.perplexity.ai/search?q='+encodeURIComponent(q);},
    grok:function(q){return 'https://grok.com/?q='+encodeURIComponent(q);}};
  var LLM_NAMES={claude:'Claude',chatgpt:'ChatGPT',perplexity:'Perplexity',grok:'Grok'};
  function askAI(prompt){var base=String(prompt||'').trim().slice(0,1700);if(!base)return;
    var q=base+'\n\nFormat your answer to be rich and scannable, not a wall of text: use short headings, bullet points, and a compact table or side-by-side comparison where it genuinely helps. If a chart or simple visual would clarify it, include one.';
    window.open((LLM[myLLM()]||LLM.claude)(q),'_blank','noopener');vibe(10);bump('ai_used',1,true);track('ask_ai',{section:tab});}
  var aiStore=[];
  function aiBtn(label,fn){return '<button class="aibtn" data-ai="'+(aiStore.push(fn)-1)+'">✦ '+esc(label)+'</button>';}
  function wireAI(root){$$('.aibtn[data-ai]',root).forEach(function(b){if(b._w)return;b._w=1;
    b.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();var f=aiStore[+b.dataset.ai];if(f)askAI(typeof f==='function'?f():f);});});}
  function briefingPrompt(){return 'Give me my personal daily briefing for today. Using my connected Gmail, Slack and Google Calendar, summarise concisely and prioritised:\n1) Important or unread emails needing my reply (sender + one-line why).\n2) Slack messages where I am @mentioned or DMed (who/where + gist).\n3) Today\'s meetings with times and a one-line prep note each.\nPut anything urgent at the very top. If you cannot access these, tell me exactly what to connect.';}

  /* ===== live client data ===== */
  var LIVE={crypto:store.get('live_crypto',null),fx:store.get('live_fx',null)};
  var COINS=[['bitcoin','Bitcoin','BTC'],['ethereum','Ethereum','ETH'],['solana','Solana','SOL'],['ripple','XRP','XRP'],['binancecoin','BNB','BNB'],['dogecoin','Dogecoin','DOGE'],['cardano','Cardano','ADA'],['tron','TRON','TRX']];
  var STOCK_DOMAINS={'Reliance':'ril.com','TCS':'tcs.com','HDFC Bank':'hdfcbank.com','Infosys':'infosys.com','ICICI Bank':'icicibank.com','SBI':'sbi.co.in','Bharti Airtel':'airtel.in','L&T':'larsentoubro.com','Tata Motors':'tatamotors.com','M&M':'mahindra.com','Maruti Suzuki':'marutisuzuki.com','ITC':'itcportal.com','HUL':'hul.co.in','Sun Pharma':'sunpharma.com','Bajaj Finance':'bajajfinserv.in','Adani Ent':'adani.com'};
  function logoImg(name){var d=STOCK_DOMAINS[name];return d?'<img class="logo" src="https://www.google.com/s2/favicons?domain='+d+'&sz=64" alt="" onerror="this.style.display=\'none\'">':'';}
  function jf(u,ms){return fetch(u,{signal:AbortSignal.timeout(ms||9000)}).then(function(r){if(!r.ok)throw 0;return r.json();});}
  function loadLive(){
    jf('https://api.coingecko.com/api/v3/coins/markets?vs_currency=inr&ids='+COINS.map(function(c){return c[0];}).join(',')+'&price_change_percentage=24h&sparkline=true&order=market_cap_desc').then(function(j){
      var items=(j||[]).map(function(c){var sp=(c.sparkline_in_7d&&c.sparkline_in_7d.price||[]);
        return {n:c.name,s:(c.symbol||'').toUpperCase(),price:Math.round(c.current_price),pct:+(c.price_change_percentage_24h||0).toFixed(2),img:c.image,
          spark:sp.filter(function(_,i){return i%6===0;})};});
      LIVE.crypto={at:Date.now(),items:items};store.set('live_crypto',LIVE.crypto);if(tab==='markets')renderMarkets();}).catch(function(){});
    jf('https://api.frankfurter.dev/v1/latest?base=USD&symbols=INR,EUR,GBP').then(function(j){var r=j.rates;
      LIVE.fx={at:Date.now(),usdinr:r.INR,eurinr:+(r.INR/r.EUR).toFixed(2),gbpinr:+(r.INR/r.GBP).toFixed(2)};
      store.set('live_fx',LIVE.fx);}).catch(function(){});
  }

  function buildDeck(wrap,items,onSwipe,tpl,saveLabel){ wrap.innerHTML='';
    items.slice().reverse().forEach(function(item,ri){var i=items.length-1-ri;var el=document.createElement('div');
      el.className='deckcard'+(i===0?' top':'');el.style.transform='translateY('+(i*9)+'px) scale('+(1-i*.03)+')';el.style.zIndex=String(10-i);
      el.innerHTML=tpl(item)+'<span class="stampR">YES ✓</span><span class="stampL">SKIP ✕</span>'+(saveLabel?'<span class="stampU">'+saveLabel+'</span>':'');
      wrap.appendChild(el); wireAI(el); if(i===0)attachDrag(el,item,onSwipe,!!saveLabel);});
  }
  function attachDrag(el,item,onSwipe,canSave){var sx=0,sy=0,dx=0,dy=0,dr=false;
    function stamps(){el.querySelector('.stampR').style.opacity=Math.min(1,Math.max(0,dx/90));el.querySelector('.stampL').style.opacity=Math.min(1,Math.max(0,-dx/90));var u=el.querySelector('.stampU');if(u)u.style.opacity=Math.min(1,Math.max(0,Math.abs(dy)/90-Math.abs(dx)/180));}
    function move(e){if(!dr)return;dx=e.clientX-sx;dy=e.clientY-sy;if(canSave&&Math.abs(dy)>Math.abs(dx))el.style.transform='translateY('+dy+'px)';else el.style.transform='translateX('+dx+'px) rotate('+(dx/22)+'deg)';stamps();}
    function up(){if(!dr)return;dr=false;el.classList.remove('drag');document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);
      var v=canSave&&Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>85;
      if(v){vibe(16);el.style.transform='translateY('+(dy>0?520:-520)+'px)';el.style.opacity='0';setTimeout(function(){onSwipe(item,'save');},190);}
      else if(Math.abs(dx)>85){var d=dx>0?1:-1;vibe(d>0?14:[6,16]);el.style.transform='translateX('+(d*480)+'px) rotate('+(d*24)+'deg)';el.style.opacity='0';setTimeout(function(){onSwipe(item,d);},190);}
      else{el.style.transform='';dx=0;dy=0;stamps();}dx=0;dy=0;}
    el.addEventListener('pointerdown',function(e){if(e.target.closest('a')||e.target.closest('button'))return;dr=true;sx=e.clientX;sy=e.clientY;el.classList.add('drag');try{el.setPointerCapture(e.pointerId);}catch(x){}document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);});
  }

    $$('#wTop button').forEach(function(b){b.onclick=function(){b.classList.toggle('on');};});
    $$('[data-b]').forEach(function(c){c.onclick=function(){$$('[data-b]').forEach(function(x){x.classList.remove('on');});c.classList.add('on');wizData.briefing=c.dataset.b==='1';};});
    $$('#wTheme button').forEach(function(b){b.onclick=function(){$$('#wTheme button').forEach(function(x){x.classList.remove('on');});b.classList.add('on');wizData.theme=b.dataset.k;theme=b.dataset.k;store.set('theme',theme);applyTheme();};});
  }
  function collectWiz(){ var wn=$('#wName');if(wn)wizData.name=wn.value;
    if($('#wInt'))wizData.interests=$$('#wInt button.on').map(function(b){return b.dataset.k;});
    if($('#wTop'))wizData.topics=$$('#wTop button.on').map(function(b){return b.dataset.k;});
  }
  function finishWiz(){ profile={name:(wizData.name.trim()||'friend'),topics:wizData.topics.length?wizData.topics:ALLTOPICS.slice(),
      interests:wizData.interests,risk:wizData.risk||'balanced',llm:wizData.llm||'claude',briefing:!!wizData.briefing,theme:wizData.theme};
    store.set('profile',profile);store.set('llm',profile.llm);theme=profile.theme;store.set('theme',theme);applyTheme();
    track('onboarding_done',{briefing:!!profile.briefing,interests:(profile.interests||[]).length,llm:profile.llm,risk:profile.risk});
    $('#wiz').classList.remove('on');$('#avaBtn').textContent=(profile.name[0]||'A').toUpperCase();
    if(DATA){doRender(tab);} toast('Welcome, '+profile.name+' 👋');vibe([10,30,10]);}

  /* shared-into-app text → interview notes (kept) */
  try{var sp=new URLSearchParams(location.search),shared=[sp.get('title'),sp.get('text'),sp.get('url')].filter(Boolean).join('\n');
    if(shared){var pp=store.get('prep',{});pp.n=(pp.n?pp.n+'\n':'')+shared;store.set('prep',pp);history.replaceState(null,'',location.pathname);setTimeout(function(){toast('Saved to your notes');},700);}}catch(e){}

  /* ===================== Ask-AI FAB (every screen) ===================== */
  function openAsk(){ openSheet('<h3>✦ Ask AI <span style="font-size:12px;color:var(--ink3);font-weight:600">via '+esc(LLM_NAMES[myLLM()])+'</span></h3>'
    +'<textarea id="askTxt" placeholder="Ask anything — markets, a concept, your career, today\'s news…"></textarea>'
    +'<div class="chips" id="askChips"></div>'
    +'<div style="font-size:12px;color:var(--ink3);margin-bottom:8px">Opens a prefilled chat in your AI. Tip: the AI Studio tab has ready-made packs.</div>'
    +'<button class="bigbtn grad" id="askGo">Ask '+esc(LLM_NAMES[myLLM()])+' ↗</button>');
    var byTab={
      home:['Explain today\'s Indian markets simply','Summarise today\'s top news for me','What should I learn today for my career','Give me one 5-minute productivity win'],
      markets:['Explain what moved Indian markets today','Analyse a stock — bull case vs bear case','SIP vs lumpsum in this market — explain','Explain P/E, VIX and market cap with examples'],
      news:['Summarise today\'s top news and why it matters','Explain the biggest business story today','Market implications of today\'s headlines','Give me both sides of today\'s big debate'],
      learn:['Quiz me on SQL window functions','Teach me Excel pivot tables in 10 minutes','Explain DAX filter context with an example','Build me a 30-day data-analytics study plan'],
      ai:['Draft a professional email for me','Turn my rough notes into meeting minutes','Mock-interview me for a Data Analyst role','Make me an investment learning plan'],
      you:['Suggest a plan to keep my streak going','Which skills should I focus on next?','Summarise what I should revise this week']
    };
    var chips=byTab[tab]||byTab.home;
    $('#askChips').innerHTML=chips.map(function(c,i){return '<button class="chipbtn" data-c="'+i+'">'+esc(c)+'</button>';}).join('');
    $$('#askChips .chipbtn').forEach(function(b){b.onclick=function(){$('#askTxt').value=chips[+b.dataset.c];$('#askTxt').focus();};});
    $('#askGo').addEventListener('click',function(){var v=$('#askTxt').value.trim();if(!v){toast('Type a question first');return;}closeSheet();askAI(v);});
    setTimeout(function(){var t=$('#askTxt');if(t)t.focus();},80);
  }
  $('#aiFab').addEventListener('click',openAsk);

  /* ===================== BOOT ===================== */
  function boot(){ if(!DATA)return; $('#meta').innerHTML='Updated '+esc(DATA.label||'')+staleCheck(); doRender(tab); }
  var usedEmbed=false;
  function load(bust){var q=bust?('?t='+Date.now()):'';
    var pD=fetch('data/data.json'+q,{cache:bust?'no-store':'default'}).then(function(r){if(!r.ok)throw 0;return r.json();}).catch(function(){usedEmbed=true;return window.EMBED_DATA||null;});
    var pS=SKILLS?Promise.resolve(SKILLS):fetch('data/skills-index.json').then(function(r){if(!r.ok)throw 0;return r.json();}).catch(function(){return window.EMBED_SKILLS||null;});
    return Promise.all([pD,pS]).then(function(res){if(res[0])DATA=res[0];if(res[1])SKILLS=res[1];
      if(DATA){boot();if(usedEmbed)$('#meta').innerHTML='Updated '+esc(DATA.label||'')+' <span class="stale">· offline copy</span>';}
      else $('#meta').innerHTML='<span class="stale">No data — see README</span>'; usedEmbed=false;});}
  $('#refreshBtn').addEventListener('click',function(){var b=this;b.style.transform='rotate(360deg)';b.style.transition='transform .5s';setTimeout(function(){b.style.transform='';b.style.transition='';},520);load(true);loadLive();toast('Refreshed');});
  $('#avaBtn').textContent=(myName()[0]||'A').toUpperCase();
  applyTheme(); setTab(tab); load(false); loadLive(); track('app_open',{});
  if(!profile)setTimeout(wizOpen,350);
  setInterval(function(){if(document.visibilityState==='visible'){load(true);loadLive();}},5*60*1000);
  if(location.protocol!=='file:'&&'serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
})();
</script>
</body>
</html>
